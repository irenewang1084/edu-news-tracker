yamlname: Daily RSS Fetch

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch RSS feeds & write news.json
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python scripts/fetch_rss.py

      - name: Commit updated news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news.json
          git diff --cached --quiet \
            || git commit -m "chore: rss update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
